<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" width="240" height="80">
  <defs>
    <linearGradient id="nishanth-teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="nishanth-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>
  </defs>
  <!-- Logo Icon: Stylized N and Cross -->
  <g transform="translate(15, 12)">
    <!-- Shield/Ring base -->
    <rect x="8" y="8" width="40" height="40" rx="8" fill="none" stroke="url(#nishanth-teal)" stroke-width="2.5"/>
    <!-- Stylized 'N' combined with Cross -->
    <path d="M 16 16 L 24 16 L 32 32 L 32 16 L 40 16 L 40 40 L 32 40 L 24 24 L 24 40 L 16 40 Z" fill="url(#nishanth-blue)"/>
    <!-- Floating heal cross dot -->
    <path d="M 28 14 L 32 14 L 32 18 L 28 18 Z" fill="url(#nishanth-teal)"/>
  </g>
  <!-- Typography -->
  <g transform="translate(75, 25)">
    <text font-family="'Outfit', 'Inter', sans-serif" font-size="16" font-weight="800" fill="#0f172a" letter-spacing="0.5">NISHANTH</text>
    <text font-family="'Outfit', 'Inter', sans-serif" font-size="11" font-weight="600" fill="#475569" letter-spacing="1.5" y="16">HOSPITAL</text>
    <text font-family="'Outfit', 'Inter', sans-serif" font-size="9" font-weight="500" fill="#3b82f6" letter-spacing="1" y="28">ERODE</text>
  </g>
</svg>
